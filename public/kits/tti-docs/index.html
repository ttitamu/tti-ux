<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<title>tti-ux · living style guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../../colors_and_type.css?v=1777059700001" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: var(--surface-page); color: var(--text-primary); font-family: var(--font-sans); }
  #root { min-height: 100vh; }
  @keyframes tux-spin { to { transform: rotate(360deg); } }
  code { font-family: var(--font-mono); background: var(--surface-sunken); padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="TuxComponents.jsx"></script>
<script type="text/babel" src="DocsChrome.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState("home");
  const [hc, setHc] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", hc ? "tti-hc" : "tti");
  }, [hc]);

  const navigate = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: "smooth" }); };

  let page;
  if (route === "home") page = <HomePage onNavigate={navigate} />;
  else if (route === "foundations") page = <FoundationsPage onNavigate={navigate} />;
  else if (route === "tokens") page = <TokensPage />;
  else if (route === "typography") page = <TypographyPage />;
  else if (route === "motion") page = <MotionPage />;
  else if (route === "components") page = <ComponentsPage onNavigate={navigate} />;
  else page = <HomePage onNavigate={navigate} />;

  return (
    <>
      <DocsHeader route={route} onNavigate={navigate} />
      <main>{page}</main>
      <DocsFooter highContrast={hc} onToggleHC={() => setHc(!hc)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<title>tti-ux · PECAN (UI kit)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../../colors_and_type.css?v=1777059800000" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--surface-page); color: var(--text-primary); font-family: var(--font-sans); }
  #root { height: 100vh; }
  @keyframes tux-spin { to { transform: rotate(360deg); } }
  code { font-family: var(--font-mono); background: var(--surface-sunken); padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="TuxComponents.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [route, setRoute] = useState("home");
  const titles = {
    home: "Overview",
    scans: "Scans",
    "scans/new": "New scan",
    classifiers: "Classifiers",
    indices: "Indices",
    settings: "Settings",
  };
  let page;
  if (route === "home") page = <OverviewPage onNavigate={setRoute} />;
  else if (route === "scans") page = <ScansPage onStartNew={() => setRoute("scans/new")} />;
  else if (route === "scans/new") page = <NewScanPage onCancel={() => setRoute("scans")} onSubmit={() => setRoute("scans")} />;
  else if (route === "classifiers") page = <ClassifiersPage />;
  else page = (
    <div>
      <TuxPageHeader eyebrow={route} title={titles[route]}>
        Page not implemented in this UI kit — see overview, scans, or classifiers for working examples.
      </TuxPageHeader>
    </div>
  );

  const sidebarRoute = route.startsWith("scans") ? "scans" : route;

  return (
    <div style={{ display: "flex", height: "100vh" }}>
      <Sidebar route={sidebarRoute} onNavigate={(r) => setRoute(r)} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <TopBar title={titles[route] || route} />
        <main style={{ flex: 1, overflow: "auto", padding: 32 }}>{page}</main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

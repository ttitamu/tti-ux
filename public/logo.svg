<?xml version="1.0" encoding="UTF-8"?>
<!--
  tti-ux logo — stylized tuxedo in TTI brand colors.
  Rounded charcoal frame, maroon jacket with curved lapels, white shirt
  wedge, gold bow tie with center knot.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="tti-ux"
>
  <title>tti-ux</title>

  <!-- Charcoal rounded frame so the mark reads on any background. -->
  <rect width="64" height="64" rx="12" fill="#221F1F"/>

  <!-- Maroon jacket: two mirrored panels meeting at the neck, with curved
       lapels that bevel out toward the shoulders. The meeting point sits
       at (32, 22) — just below the top collar — and sweeps down past the
       visible bottom edge, clipped by the rounded frame. -->
  <path
    d="M 10 56
       L 10 28
       Q 14 22 22 22
       Q 27 22 32 30
       L 28 38
       L 26 56
       Z"
    fill="#5C0025"
  />
  <path
    d="M 54 56
       L 54 28
       Q 50 22 42 22
       Q 37 22 32 30
       L 36 38
       L 38 56
       Z"
    fill="#5C0025"
  />

  <!-- White shirt wedge — the opening between the jacket panels. -->
  <path
    d="M 28 38
       L 32 30
       L 36 38
       L 38 56
       L 26 56
       Z"
    fill="#FFFFFF"
  />

  <!-- Gold bow tie: two triangular wings + a small center knot. Sits at
       the top of the shirt wedge so it reads as a proper bow, not a
       floating diamond. -->
  <path
    d="M 22 34
       L 30 32
       L 30 40
       L 22 38
       Z"
    fill="#DDAC37"
  />
  <path
    d="M 42 34
       L 34 32
       L 34 40
       L 42 38
       Z"
    fill="#DDAC37"
  />
  <rect x="30" y="32.5" width="4" height="7" rx="0.8" fill="#DCAA37"/>

  <!-- Tiny gold stud just below the bow, classic tuxedo detail. -->
  <circle cx="32" cy="46" r="0.9" fill="#DDAC37"/>
</svg>

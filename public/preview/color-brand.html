<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059342000" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; box-sizing: border-box; }
  .sw { border: 1px solid var(--surface-border); border-radius: var(--radius-md); overflow: hidden; background: var(--surface-raised); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 0.75rem; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="sw"><div class="chip" style="background:#5C0025"></div><div class="meta"><div class="name">tti-maroon</div><div class="hex">#5C0025</div></div></div>
<div class="sw"><div class="chip" style="background:#500000"></div><div class="meta"><div class="name">tti-maroon-deep</div><div class="hex">#500000</div></div></div>
<div class="sw"><div class="chip" style="background:#DDAC37"></div><div class="meta"><div class="name">tti-gold</div><div class="hex">#DDAC37</div></div></div>
<div class="sw"><div class="chip" style="background:#221F1F"></div><div class="meta"><div class="name">tti-charcoal</div><div class="hex">#221F1F</div></div></div>
<div class="sw"><div class="chip" style="background:#15457E"></div><div class="meta"><div class="name">tti-navy</div><div class="hex">#15457E</div></div></div>
<div class="sw"><div class="chip" style="background:#4A8892"></div><div class="meta"><div class="name">tti-teal</div><div class="hex">#4A8892</div></div></div>
<div class="sw"><div class="chip" style="background:#66814F"></div><div class="meta"><div class="name">tti-sage</div><div class="hex">#66814F</div></div></div>
<div class="sw"><div class="chip" style="background:#DCAA37"></div><div class="meta"><div class="name">tti-gold-deep</div><div class="hex">#DCAA37</div></div></div>
</body>
</html>

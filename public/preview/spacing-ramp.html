<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059349374" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); box-sizing: border-box; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; font-family: var(--font-mono); font-size: 0.75rem; }
  .bar { background: var(--brand-primary); height: 18px; border-radius: 2px; }
  .token { width: 70px; color: var(--text-secondary); }
  .px { color: var(--text-muted); min-width: 46px; text-align: right; }
</style>
</head>
<body>
<div class="row"><span class="token">space-1</span><span class="bar" style="width:0.25rem"></span><span class="px">4px</span></div>
<div class="row"><span class="token">space-2</span><span class="bar" style="width:0.5rem"></span><span class="px">8px</span></div>
<div class="row"><span class="token">space-3</span><span class="bar" style="width:0.75rem"></span><span class="px">12px</span></div>
<div class="row"><span class="token">space-4</span><span class="bar" style="width:1rem"></span><span class="px">16px</span></div>
<div class="row"><span class="token">space-6</span><span class="bar" style="width:1.5rem"></span><span class="px">24px</span></div>
<div class="row"><span class="token">space-8</span><span class="bar" style="width:2rem"></span><span class="px">32px</span></div>
<div class="row"><span class="token">space-12</span><span class="bar" style="width:3rem"></span><span class="px">48px</span></div>
<div class="row"><span class="token">space-16</span><span class="bar" style="width:4rem"></span><span class="px">64px</span></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059341691" rel="stylesheet">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); box-sizing: border-box; }
  .col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .item { font-size: 0.875rem; }
  .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--text-muted); margin-bottom: 6px; }
  .good { color: var(--color-success); font-weight: 600; }
  .bad { color: var(--color-error); font-weight: 600; text-decoration: line-through; }
</style>
</head>
<body>
<div class="col">
  <div class="item">
    <div class="label">write</div>
    <p>Scan failed — retry in 60 seconds.</p>
    <p>See the <a class="link-tti">tokens page</a>.</p>
    <p>Point the scanner at a directory to start.</p>
  </div>
  <div class="item">
    <div class="label">don't</div>
    <p><span class="bad">Oops! Something went wrong.</span></p>
    <p><span class="bad">Click here</span> for more info.</p>
    <p><span class="bad">Let's get started!</span></p>
  </div>
</div>
</body>
</html>

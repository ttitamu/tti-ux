<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059345169" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; box-sizing: border-box; }
  .cell { aspect-ratio: 1 / 1; border-radius: var(--radius-sm); border: 1px solid var(--surface-border); position: relative; }
  .label { position: absolute; bottom: 4px; left: 6px; font-family: var(--font-mono); font-size: 0.65rem; color: #221F1F; }
  .dark { color: #fff !important; }
</style>
</head>
<body>
<div class="cell" style="background:#FFFFFF"><span class="label">0</span></div>
<div class="cell" style="background:#FAFAFA"><span class="label">50</span></div>
<div class="cell" style="background:#F5F5F5"><span class="label">100</span></div>
<div class="cell" style="background:#E7E6E6"><span class="label">200</span></div>
<div class="cell" style="background:#D1D2D4"><span class="label">300</span></div>
<div class="cell" style="background:#A5A5A5"><span class="label">400</span></div>
<div class="cell" style="background:#939597"><span class="label dark">500</span></div>
<div class="cell" style="background:#7E7E7E"><span class="label dark">600</span></div>
<div class="cell" style="background:#5D5D5D"><span class="label dark">700</span></div>
<div class="cell" style="background:#4C4C4E"><span class="label dark">800</span></div>
<div class="cell" style="background:#221F1F"><span class="label dark">900</span></div>
<div class="cell" style="background:#000000"><span class="label dark">1000</span></div>
</body>
</html>

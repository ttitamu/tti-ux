<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059371801" rel="stylesheet">
<style>
  html, body { height: 100%; }
  body { margin: 0; padding: 32px 40px; background: var(--surface-page); box-sizing: border-box; font-family: var(--font-body); }
  .eyebrow { font-family: var(--font-body-bold); font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--text-muted); margin: 0 0 10px; }
  .lede { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin-top: 22px; max-width: 520px; }
  .lede code { font-family: var(--font-mono); font-size: 0.82em; background: rgba(0,0,0,0.05); padding: 1px 6px; border-radius: 3px; }
  .lede em { font-style: italic; color: var(--text-primary); }
  .meta { font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wider); margin-top: 32px; }
</style>
</head>
<body>
  <p class="eyebrow">editorial heading</p>
  <h2 class="heading--bold" style="font-size: 2.125rem; margin: 0;">Q1 Research Grants</h2>
  <p class="lede">
    <code>.heading--bold</code> — Work Sans 700, sentence case. The signature is three stacked maroon/gold bars stepping down in opacity, anchored <em>below</em> the title. Reads like a punctuation stroke, not a solid rule.
  </p>
  <div class="meta">.heading--bold · Work Sans · stacked signature</div>
</body>
</html>

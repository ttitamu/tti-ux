<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059343839" rel="stylesheet">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); box-sizing: border-box; }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--surface-border); }
  .step { flex: 1; padding: 22px 6px; text-align: center; font-family: var(--font-mono); font-size: 0.7rem; }
  .label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: var(--tracking-wider); }
  .caption { margin-top: 10px; font-size: 0.75rem; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="label">Maroon ramp — anchored at 500 = #5C0025</div>
<div class="ramp">
  <div class="step" style="background:#fbf3f6;color:#221F1F">50</div>
  <div class="step" style="background:#f5e0e7;color:#221F1F">100</div>
  <div class="step" style="background:#eab5c3;color:#221F1F">200</div>
  <div class="step" style="background:#db859e;color:#221F1F">300</div>
  <div class="step" style="background:#b14a6c;color:#fff">400</div>
  <div class="step" style="background:#5c0025;color:#fff">500</div>
  <div class="step" style="background:#4d001f;color:#fff">600</div>
  <div class="step" style="background:#3d0018;color:#fff">700</div>
  <div class="step" style="background:#2e0012;color:#fff">800</div>
  <div class="step" style="background:#1f000c;color:#fff">900</div>
  <div class="step" style="background:#150008;color:#fff">950</div>
</div>
<p class="caption">Nuxt UI resolves <code>color="primary"</code> against these shades.</p>
</body>
</html>

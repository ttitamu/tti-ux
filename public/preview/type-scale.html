<!DOCTYPE html>
<html lang="en" data-theme="tti">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059355500" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); box-sizing: border-box; }
  .row { display: grid; grid-template-columns: 110px 1fr 80px; gap: 16px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--surface-border); }
  .row:last-child { border-bottom: 0; }
  .token { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
  .meta { font-size: 0.7rem; color: var(--text-muted); text-align: right; }
  .s { font-size: 0.75rem; }
  .m { font-size: 1rem; }
  .l { font-size: 1.5rem; }
  .xl { font-size: 2.25rem; }
</style>
</head>
<body>
<div class="row"><span class="token">text-xs</span><span style="font-size:0.75rem">The quick brown fox</span><span class="meta">12 / 18</span></div>
<div class="row"><span class="token">text-sm</span><span style="font-size:0.875rem">The quick brown fox</span><span class="meta">14 / 20</span></div>
<div class="row"><span class="token">text-base</span><span style="font-size:1rem">The quick brown fox</span><span class="meta">16 / 24</span></div>
<div class="row"><span class="token">text-lg</span><span style="font-size:1.125rem">The quick brown fox</span><span class="meta">18 / 28</span></div>
<div class="row"><span class="token">text-xl</span><span style="font-size:1.25rem">The quick brown fox</span><span class="meta">20 / 28</span></div>
<div class="row"><span class="token">text-2xl</span><span style="font-size:1.5rem">The quick brown fox</span><span class="meta">24 / 32</span></div>
<div class="row"><span class="token">text-3xl</span><span style="font-size:1.875rem">The quick fox</span><span class="meta">30 / 36</span></div>
<div class="row"><span class="token">text-4xl</span><span style="font-size:2.25rem">The quick</span><span class="meta">36 / 40</span></div>
</body>
</html>

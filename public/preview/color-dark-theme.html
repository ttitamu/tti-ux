<!DOCTYPE html>
<html lang="en" data-theme="tti-dark">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="../colors_and_type.css?v=1777059342355" rel="stylesheet">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); color: var(--text-primary); box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { background: var(--surface-raised); border: 1px solid var(--surface-border); border-radius: var(--radius-md); overflow: hidden; }
  .chip { height: 44px; }
  .meta { padding: 6px 10px; }
  .name { font-size: 0.7rem; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); }
  .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--tracking-wider); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="label">data-theme="tti-dark" — warm charcoal, lightened maroon</div>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#b14a6c"></div><div class="meta"><div class="name">brand-primary</div><div class="hex">#b14a6c</div></div></div>
  <div class="sw"><div class="chip" style="background:#DDAC37"></div><div class="meta"><div class="name">brand-accent</div><div class="hex">#DDAC37</div></div></div>
  <div class="sw"><div class="chip" style="background:#15100F"></div><div class="meta"><div class="name">surface-page</div><div class="hex">#15100F</div></div></div>
  <div class="sw"><div class="chip" style="background:#221F1F"></div><div class="meta"><div class="name">surface-raised</div><div class="hex">#221F1F</div></div></div>
</div>
</body>
</html>

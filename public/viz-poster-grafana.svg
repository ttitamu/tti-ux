      <rect x="880" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.35"/>
      <!-- row 5 -->
      <rect x="0"   y="128" width="78" height="22" fill="#4A8892" fill-opacity="0.55"/>
      <rect x="80"  y="128" width="78" height="22" fill="#4A8892" fill-opacity="0.45"/>
      <rect x="160" y="128" width="78" height="22" fill="#4A8892" fill-opacity="0.60"/>

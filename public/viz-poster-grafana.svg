      <rect x="880" y="32" width="78" height="22" fill="#5C0025" fill-opacity="0.40"/>
      <!-- row 3 -->
      <rect x="0"   y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.30"/>
      <rect x="80"  y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.45"/>
      <rect x="160" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.50"/>
      <rect x="240" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.60"/>
      <rect x="320" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.50"/>
      <rect x="400" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.40"/>
      <rect x="480" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.30"/>
      <rect x="560" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.45"/>
      <rect x="640" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.55"/>
      <rect x="720" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.50"/>
      <rect x="800" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.45"/>
      <rect x="880" y="64" width="78" height="22" fill="#DDAC37" fill-opacity="0.30"/>
      <!-- row 4 -->
      <rect x="0"   y="96" width="78" height="22" fill="#15457E" fill-opacity="0.50"/>
      <rect x="80"  y="96" width="78" height="22" fill="#15457E" fill-opacity="0.65"/>
      <rect x="160" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.85"/>
      <rect x="240" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.75"/>
      <rect x="320" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.55"/>
      <rect x="400" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.45"/>
      <rect x="480" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.55"/>
      <rect x="560" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.65"/>
      <rect x="640" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.75"/>
      <rect x="720" y="96" width="78" height="22" fill="#15457E" fill-opacity="0.55"/>

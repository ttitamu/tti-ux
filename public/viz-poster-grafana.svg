  </g>

  <!-- Footer -->
  <line x1="0" y1="690" x2="1200" y2="690" stroke="#E7E6E6" stroke-width="1"/>
  <text x="40" y="720" font-family="Arial, sans-serif" font-size="11" fill="#525252">Datasource: prometheus · refresh: 30s · org: TTI · folder: PECAN-ops</text>
</svg>

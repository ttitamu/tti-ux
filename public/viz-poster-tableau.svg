<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static poster used by the /visualizations/embed Tableau demo.
  Replaces a live Tableau iframe when the live tenant isn't reachable
  (style-guide demos, air-gapped previews). Looks like a Tableau-style
  bar chart so reviewers can read the layout, not a literal screenshot.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet">
  <rect width="1200" height="750" fill="#FFFFFF"/>
  <!-- Title strip -->
  <rect x="0" y="0" width="1200" height="64" fill="#F5F5F5"/>
  <text x="40" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#221F1F">Crash report rates · 2024 · TTI corridor study</text>
  <text x="1100" y="42" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#5C0025" text-anchor="end">Tableau</text>
  <!-- Y axis labels -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#525252">
    <text x="120" y="120">1500</text>
    <text x="120" y="220">1000</text>
    <text x="120" y="320"> 500</text>
    <text x="120" y="420">   0</text>
  </g>
  <!-- Bars -->
  <g>
    <rect x="180" y="200" width="80" height="220" fill="#5C0025"/>
    <rect x="290" y="160" width="80" height="260" fill="#5C0025"/>
    <rect x="400" y="120" width="80" height="300" fill="#DDAC37"/>
    <rect x="510" y="180" width="80" height="240" fill="#5C0025"/>
    <rect x="620" y="240" width="80" height="180" fill="#5C0025"/>
    <rect x="730" y="220" width="80" height="200" fill="#5C0025"/>
    <rect x="840" y="190" width="80" height="230" fill="#5C0025"/>
    <rect x="950" y="170" width="80" height="250" fill="#15457E"/>
    <rect x="1060" y="210" width="80" height="210" fill="#5C0025"/>
  </g>
  <!-- Axis line -->
  <line x1="160" y1="420" x2="1180" y2="420" stroke="#221F1F" stroke-width="1"/>
  <!-- X labels -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
    <text x="220" y="445">IH-35</text>
    <text x="330" y="445">IH-45</text>
    <text x="440" y="445">TX-6</text>
    <text x="550" y="445">US-59</text>
    <text x="660" y="445">US-77</text>
    <text x="770" y="445">US-83</text>
    <text x="880" y="445">US-90</text>
    <text x="990" y="445">SH-71</text>
    <text x="1100" y="445">SH-130</text>
  </g>
  <!-- Legend -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#221F1F">
    <rect x="160" y="640" width="14" height="14" fill="#5C0025"/>
    <text x="180" y="652">corridor average</text>
    <rect x="320" y="640" width="14" height="14" fill="#DDAC37"/>
    <text x="340" y="652">TX-6 highlighted</text>
    <rect x="500" y="640" width="14" height="14" fill="#15457E"/>
    <text x="520" y="652">SH-130 (toll comparison)</text>
  </g>
  <!-- Footer -->
  <line x1="0" y1="690" x2="1200" y2="690" stroke="#E7E6E6" stroke-width="1"/>
  <text x="40" y="720" font-family="Arial, sans-serif" font-size="11" fill="#525252">Source: TxDOT CRIS · 2024 calendar year · TTI dashboard build 14</text>
</svg>

# Build the Nuxt site into static HTML and publish to GitHub Pages.
# The `github_pages` Nitro preset emits a fully-prerendered `dist/`,
# including a `.nojekyll` marker so GH Pages serves underscored
# directories like `_nuxt/` correctly.
#
# Triggers:
#   - push to main on ttitamu/tti-ux → publishes the live site
#   - manual workflow_dispatch → for republish without a code change
#
# **This workflow is gated to the production repo** (ttitamu/tti-ux).
# Forks and the test repo (anthonyguevara/tti-ux-test) skip the build
# entirely — Pages requires repo-level enablement that the workflow
# token can't grant on its own (Resource not accessible by integration
# from configure-pages@v5). To enable Pages on a fork:
#   1. Settings → Pages → Source = "GitHub Actions"
#   2. Re-run this workflow.
# After that one-time manual step, the gate below can be relaxed for
# the fork.
#
# Required GH settings: Settings → Pages → Source = "GitHub Actions"
# (not "Deploy from a branch"). Permissions are scoped per the
# `permissions:` block below.

name: deploy to github pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight run; cancel earlier deploys when a newer commit
# lands so the live site reflects HEAD without race conditions.
concurrency:
  group: pages
  cancel-in-progress: true

# Force JavaScript-based actions (checkout, setup-node, etc.) onto
# the Node 24 runtime. Without this they fall back to Node 20,
# which is deprecated as of 2025-09. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    # Gate: only the production repo deploys. Other repos' pushes still
    # run the contrast audit (which lives in audit-contrast.yml and is
    # NOT gated), they just don't deploy.
    if: github.repository == 'ttitamu/tti-ux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 (npm 11). Earlier we used Node 22 (npm 10) and
          # `npm ci` rejected the lockfile with "Missing: cac@6.7.14
          # / commander@13.1.0 from lock file" — those are optional
          # peers of @bomb.sh/tab (declared via peerDependenciesMeta)
          # which npm 10 mis-treats as required when the lockfile was
          # generated by npm 11. Pinning to 24 matches local dev and
          # keeps the lockfile spec interpretation consistent.
          node-version: 24
          cache: npm

      - name: install
        run: npm ci

      - name: generate
        env:
          # baseURL stays at "/" (the nuxt.config.ts default) because
          # ttitamu/tti-ux deploys to a randomized Pages subdomain
          # (musical-fiesta-p3jjr6m.pages.github.io/) that serves at
          # root, NOT to ttitamu.github.io/tti-ux/. Verified via the
          # Pages API:
          #   curl /repos/ttitamu/tti-ux/pages
          #   → html_url: https://musical-fiesta-p3jjr6m.pages.github.io/
          # When/if a custom domain (e.g. tti-ux.tti.tamu.edu) lands,
          # this stays at "/". The /tti-ux/ subpath would only be
          # needed under the legacy ttitamu.github.io/tti-ux/ URL
          # pattern, which GitHub no longer issues by default for
          # private/internal repos.
          NUXT_PAGES: "1"
          # Bump V8 heap. The default (~1.5GB on Node 24) OOMed during
          # prerender — we walk ~80 routes including font fetches +
          # Shiki + Mermaid bundles. 6GB gives headroom on the
          # ubuntu-latest runner (7GB total). Symptom was:
          # "FATAL ERROR: Ineffective mark-compacts near heap limit".
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run generate

      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if it isn't already configured.
          # Lets forks (and the test repo) deploy without a manual
          # Settings → Pages → "GitHub Actions" toggle. Requires the
          # `pages: write` permission set above.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    if: github.repository == 'ttitamu/tti-ux'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

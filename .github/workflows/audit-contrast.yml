# WCAG 2.2 contrast audit on every push to main + every PR. Gates on
# AAA (7:1 normal text, 4.5:1 large) — regressions block merge.
# Independent of the deploy workflow so a transient audit failure
# doesn't block site updates.
#
# How to reproduce locally:
#   npm run generate
#   NUXT_APP_BASE_URL=/tti-ux/ AUDIT_LEVEL=AAA npm run audit:contrast
#   # → contrast-report.json + per-theme pass/fail summary
#   # Fix failing colors in tokens.css or component styles, repeat.
#
# To loosen to AA (the default human-side practical threshold):
#   AUDIT_LEVEL=AA npm run audit:contrast

name: contrast audit (WCAG 2.2 AAA)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match the deploy-pages.yml runner — Node 24 / npm 11.
          node-version: 24
          cache: npm

      - name: install
        run: npm ci

      - name: generate static site
        env:
          NUXT_APP_BASE_URL: /tti-ux/
          NUXT_PAGES: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run generate

      - name: run contrast audit (AAA gate)
        env:
          NUXT_APP_BASE_URL: /tti-ux/
          AUDIT_LEVEL: AAA
        run: npm run audit:contrast

      - name: upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contrast-report
          path: contrast-report.json
          retention-days: 14

<!doctype html>
<html lang="en" data-theme="tti">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tux web-components spike</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: var(--surface-page, #fff); color: var(--text-primary, #111); }
      .wrap { max-width: 880px; margin: 0 auto; padding: 2rem; }
      h1 { font-size: 1.25rem; }
      section { border: 1px solid #ccc; border-radius: 8px; padding: 1.25rem; margin: 1rem 0; }
      .row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; }
      .controls button { margin-right: .5rem; padding: .35rem .7rem; cursor: pointer; }
      #errors { white-space: pre-wrap; color: #b00; font-family: ui-monospace, monospace; font-size: 12px; }
      .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>tux web-components spike — plain HTML host</h1>

      <div class="controls">
        Theme:
        <button onclick="document.documentElement.dataset.theme='tti'">tti</button>
        <button onclick="document.documentElement.dataset.theme='tti-dark'">tti-dark</button>
        <button onclick="document.documentElement.dataset.theme='tti-hc'">tti-hc</button>
      </div>

      <section>
        <div class="label">Test A — tux-native (no Nuxt UI): &lt;tux-big-stat&gt;</div>
        <div class="row">
          <tux-big-stat value="126" suffix="M" label="Annual research expenditure" tone="maroon"></tux-big-stat>
          <tux-big-stat value="1,948" label="Active projects" tone="gold" size="sm"></tux-big-stat>
        </div>
      </section>

      <section>
        <div class="label">Test B — Nuxt UI wrapped (UBadge/UIcon): &lt;tux-badge&gt;</div>
        <div class="row">
          <tux-badge tier="sensitive"></tux-badge>
          <tux-badge status="running"></tux-badge>
          <tux-badge status="completed"></tux-badge>
          <tux-badge kind="tag">topic:safety</tux-badge>
          <tux-badge kind="count" count="11">md</tux-badge>
        </div>
      </section>

      <section>
        <div class="label">Registration / runtime errors</div>
        <div id="errors">(none)</div>
      </section>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
